<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base FrontEnd One - Sistema de Loja</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <header>
        <h1>Gerenciador de Loja</h1>
    </header>

    <main class="container">
        <section class="card">
            <h2>Cadastrar Produto</h2>
            <form id="form-produto">
                <input type="text" id="nome" placeholder="Nome do Produto" required>
                <input type="text" id="categoria" placeholder="Categoria" required>
                <input type="number" id="preco" placeholder="Preço (R$)" step="0.01" required>
                <input type="number" id="estoque" placeholder="Qtd. Estoque" required>
                <textarea id="descricao" placeholder="Descrição"></textarea>
                <button type="submit">Cadastrar Item</button>
            </form>
        </section>

        <section class="card">
            <h2>Estoque e Busca</h2>
            <input type="text" id="busca" placeholder="Buscar por nome..." oninput="filtrarProdutos()">
            <ul id="lista-produtos">
                </ul>
        </section>

        <section class="card">
            <h2>Frente de Caixa</h2>
            <p>Total em Vendas: <strong id="total-caixa">R$ 0,00</strong></p>
            <div id="historico-vendas"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>

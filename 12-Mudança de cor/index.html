<h2> mudança de cor</h2>
<body>
    
    <button onclick="mudarcor('red')">Vermelho</button>
    <button onclick="mudarcor('blue')">Azul</button>
    <button onclick="mudarcor('green')">Verde</button>
    <button onclick="mudarcor('yellow')">Amarelo</button>
    <button onclick="mudarcor('orange')">Laranja</button>
    <button onclick="mudarcor('purple')">Roxo</button>
    <button onclick="mudarcor('pink')">Rosa</button>
    <button onclick="mudarcor('brown')">Marrom</button>
    <button onclick="mudarcor('black')">Preto</button>
    <button onclick="mudarcor('white')">Branco</button>
    <button onclick="mudarcor('gray')">Cinza</button>
    <button onclick="mudarcor('cyan')">Ciano</button>
    <button onclick="mudarcor('magenta')">Magenta</button>
    <button onclick="mudarcor('lime')">Lima</button>
    <button onclick="mudarcor('teal')">Azul-petróleo</button>
    <button onclick="mudarcor('navy')">Azul-marinho</button>
    <button onclick="mudarcor('maroon')">Vinho</button>
    <button onclick="mudarcor('olive')">Oliva</button>

<script>
    function mudarcor(cor){
            document.body.style.backgroundColor = cor;
    }
</script>
